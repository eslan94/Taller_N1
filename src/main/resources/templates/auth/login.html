<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Login | Catálogo de Juegos</title>
    <style>
        body {
            background: linear-gradient(135deg, #1e1e2f 0%, #0d0d14 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 10px;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #0d6efd;
            color: white;
            box-shadow: none;
        }
        .btn-login {
            border-radius: 10px;
            padding: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-login:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(13, 110, 253, 0.4);
        }
        .brand-icon {
            font-size: 3rem;
            color: #0d6efd;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="login-card text-center">
    <div class="brand-icon">
        <i class="fas fa-headset"></i>
    </div>
    <h2 class="fw-bold mb-4">Bienvenido</h2>

    <div th:if="${param.error}" class="alert alert-danger py-2" style="font-size: 0.85rem;">
        Usuario o contraseña incorrectos.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3 text-start">
            <label class="form-label small text-light">Nombre de Usuario</label>
            <div class="input-group">
                <span class="input-group-text bg-transparent border-0 text-muted"><i class="fas fa-user"></i></span>
                <input type="text" name="username" class="form-control" placeholder="Ingresa tu usuario" required>
            </div>
        </div>

        <div class="mb-4 text-start">
            <label class="form-label small text-light">Contraseña</label>
            <div class="input-group">
                <span class="input-group-text bg-transparent border-0 text-muted"><i class="fas fa-lock"></i></span>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 btn-login mb-3">
            Entrar al Sistema
        </button>
    </form>
    <div class="d-flex justify-content-center align-items-center mt-3">
        <p class="text-light">
            No tienes una cuenta?
            <a th:href="@{/register}" class="text-white fw-bold">Regístrate ahora</a>
        </p>
    </div>

    <p class="mt-4 mb-0 text-light small">
        &copy; 2026 Esteban Dev - Quito
    </p>
</div>

</body>
</html>
