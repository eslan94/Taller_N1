<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <title>Nuevo Usuario</title>
</head>
<body>
<div class="d-flex justify-content-center mt-5">
  <form th:action="@{/register}" th:object="${user}" method="post">
    <div class="card" style="width: 20rem;">
      <div class="card-body d-flex flex-column gap-2">
        <h5 class="card-title">Registrar Usuario</h5>
        <h6 class="card-subtitle mb-2 text-body-secondary">Nuevo usuario</h6>
        <input th:field=*{username} class="form-control form-control-sm" type="text" placeholder="Usuario" aria-label=".form-control-sm example">
        <input th:field=*{email} class="form-control form-control-sm" type="text" placeholder="Email" aria-label=".form-control-sm example">
        <input th:field=*{date} class="form-control form-control-sm" type="text" placeholder="Fecha de Nacimiento" aria-label=".form-control-sm example">
        <input th:field=*{password} class="form-control form-control-sm" type="password" placeholder="Contraseña" aria-label=".form-control-sm example">
        <div th:if="${param.duplicate}" class="alert alert-danger" role="alert">Usuario ya registrado</div>
        <button class="btn btn-primary mt-2" type="submit">Registrar</button>
      </div>
    </div>
    <div class="d-flex justify-content-center align-items-center mt-3">
      <p class="text-muted">
        Ya tienes una cuenta?
        <a th:href="@{/login}" class="text-dark fw-bold">Inicia sesión ahora</a>
      </p>
    </div>
  </form>
</div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
