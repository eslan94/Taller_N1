<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <title>Registro | Catálogo de Juegos</title>
  <style>
    body {
      background: linear-gradient(135deg, #1e1e2f 0%, #0d0d14 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      padding: 20px;
    }
    .register-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      width: 100%;
      max-width: 450px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }
    .form-control {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      border-radius: 10px;
      padding: 12px 15px;
    }
    .form-control:focus {
      background: rgba(255, 255, 255, 0.15);
      border-color: #00d4ff;
      color: white;
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
    }
    .btn-register {
      background: linear-gradient(90deg, #0d6efd, #00d4ff);
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-weight: bold;
      transition: 0.3s;
      margin-top: 10px;
    }
    .btn-register:hover {
      filter: brightness(1.2);
      transform: translateY(-2px);
    }
    .brand-icon {
      font-size: 2.5rem;
      color: #00d4ff;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>

<div class="register-card">
  <div class="text-center">
    <div class="brand-icon">
      <i class="fas fa-user-plus"></i>
    </div>
    <h2 class="fw-bold mb-2 text-white">Nueva Cuenta</h2>
    <p class="text-light small mb-4">Regístrate para gestionar tus videojuegos</p>
  </div>

  <form th:action="@{/register}" th:object="${user}" method="post">

    <div class="mb-3">
      <label class="form-label small fw-bold text-uppercase text-light">Usuario</label>
      <div class="input-group">
        <span class="input-group-text bg-transparent border-0 text-muted"><i class="fas fa-user"></i></span>
        <input type="text" th:field="*{username}" class="form-control" placeholder="Nombre de usuario" required>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label small fw-bold text-uppercase text-light">Correo Electrónico</label>
      <div class="input-group">
        <span class="input-group-text bg-transparent border-0 text-muted"><i class="fas fa-envelope"></i></span>
        <input type="email" th:field="*{email}" class="form-control" placeholder="ejemplo@correo.com" required>
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label small fw-bold text-uppercase text-light">Contraseña</label>
      <div class="input-group">
        <span class="input-group-text bg-transparent border-0 text-muted"><i class="fas fa-lock"></i></span>
        <input type="password" th:field="*{password}" class="form-control" placeholder="••••••••" required>
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label small fw-bold text-uppercase text-light">Fecha de Nacimiento</label>
      <div class="input-group">
        <span class="input-group-text bg-transparent border-0 text-muted"><i class="fas fa-calendar-alt"></i></span>
        <input type="date" th:field="*{date}" class="form-control" required>
      </div>
    </div>

    <button type="submit" class="btn btn-primary w-100 btn-register mb-3">
      Crear mi cuenta
    </button>

    <div class="text-center mt-3">
      <span class="small text-muted text-decoration-none">¿Ya eres miembro?</span>
      <a th:href="@{/login}" class="small text-info text-decoration-none fw-bold ms-1">Inicia sesión aquí</a>
    </div>
  </form>
</div>

</body>
</html>
