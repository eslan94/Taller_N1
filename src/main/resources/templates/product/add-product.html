<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Catálogo de Videojuegos</title>
    <style>
        .card {
            transition: transform 0.2s;
            height: 100%;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">🎮 Catálogo Juegos</a>
        <a class="btn btn-outline-light btn-sm ms-auto" th:href="@{/logout}">Cerrar Sesión</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="display-5 text-primary fw-bold">VIDEOJUEGOS</h1>
        <div th:if="${role != 'ROLE_USER'}">
            <a th:href="@{/add-product}" class="btn btn-success shadow-sm">+ Nuevo Juego</a>
        </div>
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">

        <div class="col" th:each="product : ${products}">
            <div class="card h-100 border-0 shadow-sm">
                <div class="card-header bg-transparent border-0 pb-0">
                    <span class="badge bg-info text-dark" th:text="${product.category.name}">Categoría</span>
                </div>

                <div class="card-body">
                    <h5 class="card-title fw-bold text-dark" th:text="${product.name}">Nombre del Juego</h5>
                    <p class="card-text text-muted" th:text="${product.description}">Descripción corta del videojuego.</p>

                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <span class="h4 text-success mb-0" th:text="'$' + ${product.precio}">$0.00</span>
                        <small class="text-secondary">Stock: <span th:text="${product.stock}">0</span></small>
                    </div>
                </div>

                <div class="card-footer bg-light border-0 d-flex justify-content-between" th:if="${role != 'ROLE_USER'}">
                    <a th:href="@{/product/edit/{id}(id=${product.id})}" class="btn btn-warning btn-sm px-3">Editar</a>

                    <form th:action="@{/product/delete/{id}(id=${product.id})}" method="post"
                          onsubmit="return confirm('¿Seguro que desea eliminar este producto?');">
                        <button type="submit" class="btn btn-danger btn-sm px-3">Eliminar</button>
                    </form>
                </div>
            </div>
        </div> </div> <div th:if="${#lists.isEmpty(products)}" class="alert alert-info text-center mt-5">
    No hay videojuegos disponibles en este momento.
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
