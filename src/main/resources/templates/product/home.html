<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Videojuegos</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#" style="font-size: 1.5rem;">Catálogo Videojuegos</a>

            <a class="navbar-brand ms-auto" th:href="@{/logout}" style="font-size: 1.2rem;">Cerrar Sesión</a>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="text-center mb-4">
            <h1 class="display-4 text-primary">VIDEOJUEGOS DISPONIBLES</h1>
        </div>

        <div class="mb-3" th:if="${role != 'ROLE_USER'}">
            <a th:href="@{/add-product}" class="btn btn-success">Agregar Videojuego</a>
        </div>

        <table class="table table-striped table-bordered table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Categoría</th>
                <th>Stock</th>
                <th>Descripción</th>
                <th>Precio</th>
                <th class="text-center " th:if="${role != 'ROLE_USER'}">Opciones</th>
            </tr>
            </thead>
            <tbody>
                <tr th:each = "product : ${products}">
                    <td th:text="${product.id}"></td>
                    <td th:text="${product.name}"></td>
                    <td th:text="${product.category.name}"></td>
                    <td th:text="${product.stock}"></td>
                    <td th:text="${product.description}"></td>
                    <td th:text="${product.precio}"></td>
                    <td class="text-center" th:if="${role != 'ROLE_USER'}">
                        <div class="d-inline-flex gap-1">
                            <a th:href="@{/product/edit/{id}(id=${product.id})}" class="btn btn-warning btn-sm">Editar</a>
                            <form th:action="@{/product/delete/{id}(id=${product.id})}" method="post"
                                onsubmit="return confirm('¿Seguro que desea eliminar este producto?');">
                                <button type="submit" class="btn btn-danger btn-sm">Eliminar</button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>

    </div>

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
