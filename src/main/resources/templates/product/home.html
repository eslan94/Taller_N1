<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Catálogo de Videojuegos</title>
    <style>
        .card {
            transition: transform 0.2s;
            height: 100%;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">🎮 Catálogo Juegos</a>
        <a class="btn btn-outline-light btn-sm ms-auto" th:href="@{/logout}">Cerrar Sesión</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="display-5 text-primary fw-bold">VIDEOJUEGOS</h1>
        <div th:if="${role != 'ROLE_USER'}">
            <a th:href="@{/add-game}" class="btn btn-success shadow-sm">+ Nuevo Juego</a>
        </div>
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">

        <div class="col" th:each="product : ${products}">
            <div class="card h-100 border-0 shadow-sm">

                <img th:src="${product.imagenUrl != null && !product.imagenUrl.isEmpty()} ? ${product.imagenUrl} : 'https://placehold.co/600x400?text=Sin+Imagen'"
                     class="card-img-top"
                     alt="Portada del juego"
                     style="height: 250px; object-fit: cover; background-color: #f8f9fa;">

                <div class="card-body d-flex flex-column">
                    <div class="mb-2">
                        <span class="badge bg-primary text-uppercase" style="font-size: 0.7rem;" th:text="${product.category.name}">Categoría</span>
                    </div>

                    <h5 class="card-title fw-bold" th:text="${product.name}">Nombre del Juego</h5>
                    <p class="card-text text-muted small" th:text="${product.description}">Descripción breve...</p>

                    <div class="mt-auto pt-3 border-top">
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="h5 mb-0 text-success fw-bold" th:text="'$' + ${product.precio}">$0.00</span>
                            <span class="badge rounded-pill bg-light text-dark border">
                        Stock: <span th:text="${product.stock}">0</span>
                    </span>
                        </div>
                    </div>
                </div>

                <div class="card-footer bg-white border-0 pb-3" th:if="${role != 'ROLE_USER'}">
                    <div class="d-grid gap-2 d-md-flex justify-content-md-between">
                        <a th:href="@{/product/edit/{id}(id=${product.id})}" class="btn btn-outline-warning btn-sm px-4">Editar</a>
                        <form th:action="@{/product/delete/{id}(id=${product.id})}" method="post"
                              onsubmit="return confirm('¿Seguro que desea eliminar este videojuego?');">
                            <button type="submit" class="btn btn-outline-danger btn-sm px-3">Eliminar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:if="${#lists.isEmpty(products)}" class="alert alert-info text-center mt-5">
        No hay videojuegos disponibles en este momento.
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
